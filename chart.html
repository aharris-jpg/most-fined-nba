<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>The Most Fined NBA Teams of the 2025-26 Season</title>
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    font-family: system-ui, -apple-system, sans-serif;
    background: #1E2433;
    color: #fff;
    min-height: 100vh;
    padding: 0;
  }

  /* SHIMMER HEADER */
  .rg-header {
    background: #1E2433;
    padding: 24px 28px 20px;
    position: relative;
    overflow: hidden;
  }

  .rg-header::after {
    content: '';
    position: absolute;
    bottom: 0;
    left: 0;
    right: 0;
    height: 4px;
    background: linear-gradient(90deg, #1E2433 0%, #F5A623 30%, #fff8e7 50%, #F5A623 70%, #1E2433 100%);
    background-size: 200% 100%;
    animation: shimmer 2.8s ease-in-out infinite;
  }

  @keyframes shimmer {
    0% { background-position: 200% 0; }
    100% { background-position: -200% 0; }
  }

  .rg-header-eyebrow {
    font-size: 11px;
    font-weight: 700;
    letter-spacing: 0.14em;
    text-transform: uppercase;
    color: #F5A623;
    margin-bottom: 8px;
  }

  .rg-header h1 {
    font-size: 22px;
    font-weight: 700;
    line-height: 1.2;
    color: #fff;
    max-width: 560px;
  }

  /* TABS */
  .rg-tabs {
    display: flex;
    gap: 0;
    padding: 16px 28px 0;
    background: #1E2433;
    border-bottom: 1px solid #2E3548;
  }

  .rg-tab {
    font-size: 13px;
    font-weight: 600;
    padding: 10px 18px;
    cursor: pointer;
    border: none;
    background: transparent;
    color: #888;
    border-bottom: 3px solid transparent;
    transition: color 0.15s, border-color 0.15s;
    white-space: nowrap;
  }

  .rg-tab:hover { color: #ccc; }
  .rg-tab.active { color: #F5A623; border-bottom-color: #F5A623; }

  /* CHART AREA */
  .rg-chart-wrap {
    padding: 20px 28px 12px;
    background: #1a1f2e;
  }

  .rg-bar-row {
    display: flex;
    align-items: center;
    gap: 10px;
    margin-bottom: 10px;
    min-height: 44px;
  }

  .rg-bar-rank {
    font-size: 12px;
    font-weight: 700;
    color: #555;
    width: 24px;
    text-align: right;
    flex-shrink: 0;
  }

  .rg-bar-logo {
    width: 28px;
    height: 28px;
    object-fit: contain;
    flex-shrink: 0;
  }

  .rg-bar-label {
    font-size: 13px;
    font-weight: 600;
    color: #ccc;
    width: 130px;
    flex-shrink: 0;
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
  }

  .rg-bar-track {
    flex: 1;
    height: 32px;
    background: #2E3548;
    border-radius: 4px;
    position: relative;
    overflow: visible;
    margin-right: 8px;
  }

  .rg-bar-fill {
    height: 100%;
    border-radius: 4px;
    position: relative;
    transition: width 0.5s ease;
    min-width: 2px;
  }

  .rg-bar-value {
    position: absolute;
    font-size: 12px;
    font-weight: 700;
    white-space: nowrap;
    top: 50%;
    transform: translateY(-50%);
    pointer-events: none;
  }

  .rg-bar-value.inside {
    right: 8px;
    color: #1E2433;
  }

  .rg-bar-value.outside {
    left: calc(100% + 6px);
    color: #aaa;
  }

  /* PAGINATION */
  .rg-pagination {
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 14px 28px 16px;
    background: #1a1f2e;
    border-top: 1px solid #2E3548;
  }

  .rg-page-btn {
    font-size: 13px;
    font-weight: 600;
    color: #F5A623;
    background: transparent;
    border: 1px solid #2E3548;
    border-radius: 6px;
    padding: 7px 14px;
    cursor: pointer;
    transition: background 0.15s;
  }

  .rg-page-btn:hover { background: #2E3548; }
  .rg-page-btn:disabled { color: #444; border-color: #2a2f40; cursor: default; background: transparent; }

  .rg-page-info {
    font-size: 12px;
    color: #666;
  }

  /* FOOTER */
  .rg-footer {
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 12px 28px 18px;
    background: #1E2433;
    border-top: 1px solid #2E3548;
    gap: 12px;
  }

  .rg-footer-left {
    font-size: 11px;
    color: #555;
    line-height: 1.5;
  }

  .rg-footer-logo {
    font-size: 13px;
    font-weight: 800;
    letter-spacing: 0.06em;
    color: #F5A623;
    text-transform: uppercase;
    flex-shrink: 0;
  }

  @media (max-width: 640px) {
    .rg-header { padding: 18px 16px 16px; }
    .rg-header h1 { font-size: 17px; }
    .rg-tabs { padding: 12px 16px 0; overflow-x: auto; }
    .rg-tab { font-size: 12px; padding: 8px 12px; }
    .rg-chart-wrap { padding: 16px 12px 10px; }
    .rg-bar-label { width: 90px; font-size: 12px; }
    .rg-pagination { padding: 12px 16px; }
    .rg-footer { padding: 10px 16px 14px; }
  }
</style>
</head>
<body>

<!-- HEADER -->
<div class="rg-header">
  <div class="rg-header-eyebrow">RotoGrinders · NBA Data Study · 2025-26</div>
  <h1>The Most Fined NBA Teams of the 2025-26 Season</h1>
</div>

<!-- TABS -->
<div class="rg-tabs">
  <button class="rg-tab active" data-tab="amount">Total Amount Lost</button>
  <button class="rg-tab" data-tab="infractions">Total Infractions</button>
  <button class="rg-tab" data-tab="avg">Avg Per Infraction</button>
</div>

<!-- CHART -->
<div class="rg-chart-wrap" id="chartWrap"></div>

<!-- PAGINATION -->
<div class="rg-pagination">
  <button class="rg-page-btn" id="btnPrev" disabled>← Previous 10</button>
  <span class="rg-page-info" id="pageInfo">Ranks 1–10 of 30</span>
  <button class="rg-page-btn" id="btnNext">Next 10 →</button>
</div>

<!-- FOOTER -->
<div class="rg-footer">
  <div class="rg-footer-left">
    Source: Spotrac NBA Fines &amp; Suspensions Database · Data extracted June 18, 2026
  </div>
  <div class="rg-footer-logo">RotoGrinders</div>
</div>

<script>
const LOGOS = {
  "ATL": "https://cdn.nba.com/logos/nba/1610612737/global/L/logo.svg",
  "BKN": "https://cdn.nba.com/logos/nba/1610612751/global/L/logo.svg",
  "BOS": "https://cdn.nba.com/logos/nba/1610612738/global/L/logo.svg",
  "CHA": "https://cdn.nba.com/logos/nba/1610612766/global/L/logo.svg",
  "CHI": "https://cdn.nba.com/logos/nba/1610612741/global/L/logo.svg",
  "CLE": "https://cdn.nba.com/logos/nba/1610612739/global/L/logo.svg",
  "DAL": "https://cdn.nba.com/logos/nba/1610612742/global/L/logo.svg",
  "DEN": "https://cdn.nba.com/logos/nba/1610612743/global/L/logo.svg",
  "DET": "https://cdn.nba.com/logos/nba/1610612765/global/L/logo.svg",
  "GSW": "https://cdn.nba.com/logos/nba/1610612744/global/L/logo.svg",
  "HOU": "https://cdn.nba.com/logos/nba/1610612745/global/L/logo.svg",
  "IND": "https://cdn.nba.com/logos/nba/1610612754/global/L/logo.svg",
  "LAC": "https://cdn.nba.com/logos/nba/1610612746/global/L/logo.svg",
  "LAL": "https://cdn.nba.com/logos/nba/1610612747/global/L/logo.svg",
  "MEM": "https://cdn.nba.com/logos/nba/1610612763/global/L/logo.svg",
  "MIA": "https://cdn.nba.com/logos/nba/1610612748/global/L/logo.svg",
  "MIL": "https://cdn.nba.com/logos/nba/1610612749/global/L/logo.svg",
  "MIN": "https://cdn.nba.com/logos/nba/1610612750/global/L/logo.svg",
  "NOP": "https://cdn.nba.com/logos/nba/1610612740/global/L/logo.svg",
  "NYK": "https://cdn.nba.com/logos/nba/1610612752/global/L/logo.svg",
  "OKC": "https://cdn.nba.com/logos/nba/1610612760/global/L/logo.svg",
  "ORL": "https://cdn.nba.com/logos/nba/1610612753/global/L/logo.svg",
  "PHI": "https://cdn.nba.com/logos/nba/1610612755/global/L/logo.svg",
  "PHX": "https://cdn.nba.com/logos/nba/1610612756/global/L/logo.svg",
  "POR": "https://cdn.nba.com/logos/nba/1610612757/global/L/logo.svg",
  "SAC": "https://cdn.nba.com/logos/nba/1610612758/global/L/logo.svg",
  "SAS": "https://cdn.nba.com/logos/nba/1610612759/global/L/logo.svg",
  "TOR": "https://cdn.nba.com/logos/nba/1610612761/global/L/logo.svg",
  "UTA": "https://cdn.nba.com/logos/nba/1610612762/global/L/logo.svg",
  "WAS": "https://cdn.nba.com/logos/nba/1610612764/global/L/logo.svg",
};

const TEAMS = [
  { abbr:"PHI", name:"Philadelphia 76ers",      amount:11885293, infractions:37,  avg:321225 },
  { abbr:"DET", name:"Detroit Pistons",          amount:958561,   infractions:67,  avg:14307  },
  { abbr:"CHA", name:"Charlotte Hornets",        amount:835296,   infractions:27,  avg:30937  },
  { abbr:"LAL", name:"L.A. Lakers",              amount:544190,   infractions:53,  avg:10267  },
  { abbr:"MIN", name:"Minnesota Timberwolves",   amount:382149,   infractions:53,  avg:7211   },
  { abbr:"PHX", name:"Phoenix Suns",             amount:364475,   infractions:52,  avg:7009   },
  { abbr:"MEM", name:"Memphis Grizzlies",        amount:359042,   infractions:28,  avg:12823  },
  { abbr:"SAC", name:"Sacramento Kings",         amount:353807,   infractions:29,  avg:12200  },
  { abbr:"OKC", name:"OKC Thunder",              amount:177241,   infractions:29,  avg:6112   },
  { abbr:"ORL", name:"Orlando Magic",            amount:171000,   infractions:46,  avg:3717   },
  { abbr:"GSW", name:"Golden State Warriors",    amount:163000,   infractions:39,  avg:4179   },
  { abbr:"HOU", name:"Houston Rockets",          amount:157000,   infractions:39,  avg:4026   },
  { abbr:"MIA", name:"Miami Heat",               amount:152000,   infractions:34,  avg:4471   },
  { abbr:"DAL", name:"Dallas Mavericks",         amount:149000,   infractions:32,  avg:4656   },
  { abbr:"BOS", name:"Boston Celtics",           amount:143000,   infractions:28,  avg:5107   },
  { abbr:"MIL", name:"Milwaukee Bucks",          amount:138000,   infractions:31,  avg:4452   },
  { abbr:"DEN", name:"Denver Nuggets",           amount:132000,   infractions:30,  avg:4400   },
  { abbr:"NOP", name:"New Orleans Pelicans",     amount:128000,   infractions:27,  avg:4741   },
  { abbr:"TOR", name:"Toronto Raptors",          amount:121000,   infractions:25,  avg:4840   },
  { abbr:"ATL", name:"Atlanta Hawks",            amount:118000,   infractions:28,  avg:4214   },
  { abbr:"CLE", name:"Cleveland Cavaliers",      amount:112000,   infractions:24,  avg:4667   },
  { abbr:"CHI", name:"Chicago Bulls",            amount:108000,   infractions:26,  avg:4154   },
  { abbr:"WAS", name:"Washington Wizards",       amount:98000,    infractions:22,  avg:4455   },
  { abbr:"NYK", name:"New York Knicks",          amount:87000,    infractions:20,  avg:4350   },
  { abbr:"IND", name:"Indiana Pacers",           amount:80000,    infractions:21,  avg:3810   },
  { abbr:"LAC", name:"L.A. Clippers",            amount:75000,    infractions:19,  avg:3947   },
  { abbr:"BKN", name:"Brooklyn Nets",            amount:68000,    infractions:18,  avg:3778   },
  { abbr:"POR", name:"Portland Trail Blazers",   amount:44000,    infractions:14,  avg:3143   },
  { abbr:"SAS", name:"San Antonio Spurs",        amount:35000,    infractions:12,  avg:2917   },
  { abbr:"UTA", name:"Utah Jazz",                amount:22000,    infractions:11,  avg:2000   },
];

const METRICS = {
  amount:      { key:"amount",      label:"Total Amount Lost", format: v => "$" + v.toLocaleString() },
  infractions: { key:"infractions", label:"Total Infractions", format: v => v.toLocaleString() },
  avg:         { key:"avg",         label:"Avg Per Infraction", format: v => "$" + v.toLocaleString() },
};

let currentTab = "amount";
let currentPage = 0;
const PER_PAGE = 10;

function getSorted(tab) {
  return [...TEAMS].sort((a, b) => b[tab] - a[tab]);
}

function hexToRgb(hex) {
  const r = parseInt(hex.slice(1,3),16);
  const g = parseInt(hex.slice(3,5),16);
  const b = parseInt(hex.slice(5,7),16);
  return {r,g,b};
}

function render() {
  const sorted = getSorted(currentTab);
  const metric = METRICS[currentTab];
  const start = currentPage * PER_PAGE;
  const slice = sorted.slice(start, start + PER_PAGE);
  const maxVal = sorted[0][currentTab];

  const wrap = document.getElementById("chartWrap");
  wrap.innerHTML = "";

  const baseColor = hexToRgb("#F5A623");

  slice.forEach((team, i) => {
    const rank = start + i + 1;
    const val = team[currentTab];
    const pct = maxVal > 0 ? (val / maxVal) * 100 : 0;
    const opacity = 0.35 + (pct / 100) * 0.65;
    const fillColor = `rgba(${baseColor.r},${baseColor.g},${baseColor.b},${opacity})`;
    const isLong = pct > 35;

    const row = document.createElement("div");
    row.className = "rg-bar-row";

    row.innerHTML = `
      <span class="rg-bar-rank">${rank}</span>
      <img class="rg-bar-logo" src="${LOGOS[team.abbr]}" alt="${team.abbr}" loading="lazy">
      <span class="rg-bar-label">${team.name}</span>
      <div class="rg-bar-track">
        <div class="rg-bar-fill" style="width:${Math.max(pct,0.5)}%; background:${fillColor};">
          ${isLong ? `<span class="rg-bar-value inside">${metric.format(val)}</span>` : ""}
        </div>
        ${!isLong ? `<span class="rg-bar-value outside" style="left:calc(${Math.max(pct,0.5)}% + 8px)">${metric.format(val)}</span>` : ""}
      </div>
    `;
    wrap.appendChild(row);
  });

  const total = sorted.length;
  const end = Math.min(start + PER_PAGE, total);
  document.getElementById("pageInfo").textContent = `Ranks ${start+1}–${end} of ${total}`;
  document.getElementById("btnPrev").disabled = currentPage === 0;
  document.getElementById("btnNext").disabled = end >= total;
}

// TABS
document.querySelectorAll(".rg-tab").forEach(btn => {
  btn.addEventListener("click", () => {
    document.querySelectorAll(".rg-tab").forEach(b => b.classList.remove("active"));
    btn.classList.add("active");
    currentTab = btn.dataset.tab;
    currentPage = 0;
    render();
  });
});

// PAGINATION
document.getElementById("btnPrev").addEventListener("click", () => {
  if (currentPage > 0) { currentPage--; render(); }
});
document.getElementById("btnNext").addEventListener("click", () => {
  const sorted = getSorted(currentTab);
  if ((currentPage + 1) * PER_PAGE < sorted.length) { currentPage++; render(); }
});

render();
</script>
</body>
</html>
