<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Adam Silver – NBA Commissioner</title>
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  body { background: #1E2433; }
  figure {
    width: 100%;
    position: relative;
  }
  figure::before {
    content: '';
    display: block;
    height: 4px;
    background: linear-gradient(90deg, #1E2433 0%, #F5A623 100%);
  }
  figure img {
    display: block;
    width: 100%;
    height: 360px;
    object-fit: cover;
    object-position: center top;
  }
  figcaption {
    background: #1E2433;
    color: #aaa;
    font-family: system-ui, -apple-system, sans-serif;
    font-size: 12px;
    line-height: 1.5;
    padding: 10px 14px;
  }
</style>
</head>
<body>
<figure>
  <img src="https://cdn.nba.com/manage/2022/09/silver091422-1.jpg" alt="NBA Commissioner Adam Silver">
  <figcaption>The NBA collected $17,606,626 in fines and forfeited salaries across 946 infractions in 2025-26 — a 17.4% increase on the prior season. Credit: NBA / Getty Images</figcaption>
</figure>
</body>
</html>
